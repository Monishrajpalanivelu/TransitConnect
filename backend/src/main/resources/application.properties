spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/TransitConnect}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:Monish@123}

# Scalability: HikariCP Connection Pool Tuning
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.connection-timeout=30000


spring.jpa.hibernate.ddl-auto=${DDL_AUTO:none}
spring.jpa.show-sql=false

jwt.secret=${JWT_SECRET:TransitConnectSuperSecretKeyForJwtTokens1234567890}

# Redis Caching Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.cache.type=redis
spring.cache.redis.time-to-live=600000

# Observability & Monitoring (Actuator + Prometheus)
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=TransitConnect

server.port=${PORT:8081}
server.error.include-message=always
